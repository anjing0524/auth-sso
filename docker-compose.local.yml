# ==============================================================================
# Auth-SSO 本地全栈验证 Docker Compose 配置
# ==============================================================================
# 用途：在本机完整构建并验证 portal、gateway、postgres、redis 服务及基础设施
# 启动命令: docker compose -f docker-compose.local.yml up -d --build
# ==============================================================================

services:
  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: auth-sso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_sso
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-sso-network

  # ============================================
  # Redis 缓存/Session 存储
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: auth-sso-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy volatile-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-sso-network

  # ============================================
  # Portal (Management + IDP) - 本地构建
  # ============================================
  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: https://localhost:18443
    container_name: auth-sso-portal-local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_sso
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: https://localhost:18443
      PORTAL_CLIENT_SECRET: portal-secret
      # Docker 内 Next.js 不监听 127.0.0.1，内部调用需通过 Docker 服务名
      PORTAL_INTERNAL_URL: http://portal:4000
    expose:
      - "4000"
    ports:
      - "4100:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:4000/api/health\", r => { process.exit(r.statusCode === 200 ? 0 : 1) })'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - auth-sso-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Pingora 信创网关 - 本地构建（使用本地自签名证书）
  # ============================================
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: auth-sso-gateway-local
    restart: unless-stopped
    environment:
      RUST_LOG: info
    ports:
      - "18080:80"
      - "18443:443"
    volumes:
      # 挂载本地自签名证书进行测试
      - ./apps/gateway/ssl:/etc/gateway/ssl:ro
    depends_on:
      portal:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -skf https://localhost:443/login > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - auth-sso-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# 网络配置
# ============================================
networks:
  auth-sso-network:
    driver: bridge

# ============================================
# 数据卷配置
# ============================================
volumes:
  postgres_data:
    name: auth-sso-postgres-data
  redis_data:
    name: auth-sso-redis-data
