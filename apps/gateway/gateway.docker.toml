# ==============================================================================
# Auth-SSO 信创安全网关 Docker 环境配置
# ==============================================================================

[gateway]
port = 80
ssl_port = 443
ssl_cert_path = "/etc/gateway/ssl/fullchain.pem"
ssl_key_path = "/etc/gateway/ssl/privkey.pem"
log_dir = "logs"
log_level = "info"

[redis]
url = "redis://redis:6379"

# ==============================================================================
# 多 Upstream 路由表 — name 即 path prefix，按长度降序最长匹配。
# ==============================================================================

[[upstreams]]
name = "/"
addresses = "portal:4000"
oidc_provider = true
public_paths = [
    "/login",
    "/register",
    "/error",
    "/api/auth/",
    "/oauth2/",
    "/.well-known/",
    "/",
    "/_next/",
    "/favicon.ico",
]

[[upstreams]]
name = "/demo/"
addresses = "demo:3000"
public_paths = ["/demo/landing"]
