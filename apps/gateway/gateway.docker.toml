# ==============================================================================
# Auth-SSO 信创安全网关 Docker 环境配置
# 启动时通过 -c gateway.toml 指定（Dockerfile 中已软链接此文件）
#
# 注意：生产环境中 SSL 证书路径和 Redis URL 由 docker-compose.prod.yml
# 中的环境变量覆盖（SSL_CERT_PATH、SSL_KEY_PATH、REDIS_URL）。
# 此文件中的值为 Docker 开发/测试环境的默认值。
# ==============================================================================

[gateway]
port = 80
ssl_port = 443
ssl_cert_path = "/etc/gateway/ssl/fullchain.pem"
ssl_key_path = "/etc/gateway/ssl/privkey.pem"
log_dir = "logs"
log_level = "info"

[portal]
# Portal 容器名:端口（Docker 内置 DNS 解析）
upstream = "portal:4000"
# issuer 由 OIDC Discovery 自动获取，无需手动配置
public_paths = [
    "/login",
    "/register",
    "/error",
    "/",
    "/api/auth/",
    "/oauth2/",
    "/.well-known/",
]

[redis]
url = "redis://redis:6379"
