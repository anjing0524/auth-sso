# ==============================================================================
# Auth-SSO 信创安全网关 生产/本地通用配置文件
# ==============================================================================

[gateway]
# 网关监听的 HTTP 端口（用以强转重定向至 HTTPS）
port = 18080

# 网关监听的 HTTPS 业务代理端口
ssl_port = 18443

# TLS/SSL 证书文件路径
ssl_cert_path = "ssl/fullchain.pem"
ssl_key_path = "ssl/privkey.pem"

# 日志保存目录，默认 "logs"
log_dir = "logs"

# 日志默认输出级别
log_level = "info"

[portal]
# Next.js BFF (Portal/IdP) 上游负载均衡代理入口地址
upstream = "127.0.0.1:4100"

# OIDC 声明 Issuer (iss) 校验标志
# JWKS 端点通过 OIDC Discovery 自动发现，无需手动配置
issuer = "http://localhost:4100"

# 免鉴权直接放行的公开路径白名单前缀列表
public_paths = [
    "/login",
    "/register",
    "/error",
    "/",
    "/api/auth/",
    "/oauth2/",
    "/.well-known/"
]

[redis]
# Redis 数据库连接配置 (用于 jti 黑名单校验)
url = "redis://localhost:6379"

