[package]
name = "gateway"
version = "0.1.0"
edition = "2024"

[dependencies]
async-trait = "0.1.81"
pingora = { version = "0.8.0", features = ["openssl"] }
pingora-core = { version = "0.8.0", features = ["openssl"] }
pingora-http = "0.8.0"
pingora-load-balancing = { version = "0.8.0", features = ["openssl"] }
pingora-proxy = { version = "0.8.0", features = ["openssl"] }
openssl = { version = "0.10.66", features = ["vendored"] }

# Tracing 高性能每日滚动日志
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter", "fmt", "ansi"] }
tracing-appender = "0.2.3"

# JWT 验签：ES256 JWKS 非对称验签
jsonwebtoken = "9.3.0"
serde = { version = "1.0.209", features = ["derive"] }
serde_json = "1.0.127"

# 异步 HTTP 客户端（定时拉取 JWKS 公钥）
reqwest = { version = "0.12.7", features = ["json", "rustls-tls"], default-features = false }

# 异步运行时（JWKS 刷新任务 + RwLock）
tokio = { version = "1.39.3", features = ["sync", "time", "rt-multi-thread", "macros"] }

# Redis 客户端：用于 jti 黑名单校验
redis = { version = "0.26.1", features = ["tokio-comp", "connection-manager"] }

# URL 编码工具（用于生成 callbackUrl）
urlencoding = "2.1.3"

# 工业级配置管理库
config = { version = "0.14.0", features = ["toml"] }

# 声明式命令行参数解析框架
clap = { version = "4.5.16", features = ["derive"] }

# 错误处理简化库
thiserror = "1.0"
anyhow = "1.0"

