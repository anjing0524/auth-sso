name: Main Branch CI

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-check:
    name: Full CI (Lint + Test + Coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth_sso_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run dependency audit
        continue-on-error: true
        run: pnpm audit --prod --audit-level=high

      - name: Migrate empty database
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auth_sso_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Seed database
        run: pnpm --filter @auth-sso/portal db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auth_sso_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Run unit, API, and component tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auth_sso_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Generate traceability inventory
        run: node tests/traceability/generate-report.mjs

      - name: Run fault injection smoke test
        if: always()
        run: node tests/performance/api-benchmark.mjs --quick
        continue-on-error: true

  gateway-full:
    name: Gateway (fmt + clippy + test + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/gateway/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/gateway/Cargo.lock') }}

      - name: Run cargo fmt --check
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run cargo test
        run: cargo test --lib

      - name: Run cargo audit
        continue-on-error: true
        run: cargo audit
