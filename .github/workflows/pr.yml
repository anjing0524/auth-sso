name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '>=26'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency audit
        # 检查已知 CVE。首次引入用 continue-on-error 观察基线，待基线清零后移除该软策略。
        continue-on-error: true
        run: pnpm audit --prod --audit-level=high

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run API tests (mocked)
        run: pnpm test:api

      - name: Run Component tests
        run: pnpm test:components

  gateway-audit:
    name: Gateway Cargo Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/gateway/target
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('apps/gateway/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        # 检查已知 CVE。首次引入用 continue-on-error 观察基线，待基线清零后移除。
        continue-on-error: true
        run: cargo audit
