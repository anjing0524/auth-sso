services:
  # ============================================
  # PostgreSQL 生产环境配置
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: auth-sso-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth_sso
    # 注意：不映射 5432 端口到宿主机，仅供 Docker 网络内部访问
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-sso-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Redis 生产环境配置
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: auth-sso-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    networks:
      - auth-sso-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Identity Provider (IdP)
  # ============================================
  idp:
    image: ${IDP_IMAGE:-your-reg/auth-sso-idp:latest}
    container_name: auth-sso-idp
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/auth_sso
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      NODE_ENV: production
    # 移除直接端口映射，通过 Nginx 访问
    expose:
      - "4001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - auth-sso-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Portal (Management)
  # ============================================
  portal:
    image: ${PORTAL_IMAGE:-your-reg/auth-sso-portal:latest}
    container_name: auth-sso-portal
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/auth_sso
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEXT_PUBLIC_IDP_URL: ${NEXT_PUBLIC_IDP_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      IDP_CLIENT_SECRET: ${IDP_CLIENT_SECRET}
      NODE_ENV: production
    # 移除直接端口映射
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - auth-sso-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Pingora 信创网关 (自研 Rust 网关替代 Nginx)
  # ============================================
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: auth-sso-gateway
    restart: always
    environment:
      - SSL_CERT_PATH=$${SSL_CERT_PATH:-/etc/gateway/ssl/live/idp.yourdomain.com/fullchain.pem}
      - SSL_KEY_PATH=$${SSL_KEY_PATH:-/etc/gateway/ssl/live/idp.yourdomain.com/privkey.pem}
      - GATEWAY_PORT=$${GATEWAY_PORT:-80}
      - GATEWAY_SSL_PORT=$${GATEWAY_SSL_PORT:-443}
      - IDP_UPSTREAM=$${IDP_UPSTREAM:-idp:4001}
      - PORTAL_UPSTREAM=$${PORTAL_UPSTREAM:-portal:4000}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/certbot/conf:/etc/gateway/ssl:ro
    depends_on:
      - idp
      - portal
    networks:
      - auth-sso-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  auth-sso-net:
    driver: bridge
